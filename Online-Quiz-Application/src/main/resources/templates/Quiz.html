<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Take Quiz – Online Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<!-- ===== Navbar ===== -->
<nav class="navbar navbar-dark bg-success shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-bold">
            <i class="bi bi-patch-question-fill me-2"></i>Online Quiz
        </span>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white-50">
                <i class="bi bi-person-circle me-1"></i>
                <strong class="text-white" th:text="${username}">User</strong>
                <span class="badge bg-light text-success ms-1">USER</span>
            </span>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-4">

    <!-- ===== Header ===== -->
    <div class="text-center mb-4">
        <h2 class="section-title">
            <i class="bi bi-clipboard2-check text-success me-2"></i>Quiz Time!
        </h2>
        <p class="text-muted">Answer all questions, then click Submit to see your results.</p>
        <!-- Progress tracking -->
        <div class="d-inline-flex align-items-center gap-2">
            <span class="badge bg-success" th:if="${quizzes != null}">
                <i class="bi bi-list-check me-1"></i>
                <span th:text="${quizzes.size()}">0</span> Question(s)
            </span>
            <span class="badge bg-secondary" id="answeredBadge">0 Answered</span>
        </div>
    </div>

    <!-- ===== Empty state ===== -->
    <div th:if="${quizzes == null or quizzes.empty}" class="text-center empty-state py-5">
        <i class="bi bi-journal-x" style="font-size: 3rem; color: #adb5bd; display: block; margin-bottom: 1rem;"></i>
        <h5 class="text-muted">No Questions Available</h5>
        <p class="text-muted">The quiz has no questions yet. Please check back later.</p>
    </div>

    <!-- ===== Quiz Form ===== -->
    <div th:unless="${quizzes == null or quizzes.empty}">
        <!--
            POST /submitQuiz
            Params: answer0, answer1, answer2, ... (indexed from 0)
            Each answerN is the selected option text for the N-th question in the list.
        -->
        <form th:action="@{/submitQuiz}" method="post" id="quizForm">

            <!-- One card per question -->
            <div th:each="quiz, status : ${quizzes}" class="card question-card">
                <div class="card-body p-4">

                    <!-- Question header -->
                    <div class="d-flex align-items-start gap-3 mb-3">
                        <span class="question-number flex-shrink-0"
                              th:text="${status.count}">1</span>
                        <h5 class="card-title mb-0 pt-1"
                            th:text="${quiz.questionText}">Question text</h5>
                    </div>

                    <!-- Answer options as radio buttons -->
                    <!--
                        Radio name = "answer" + index (0-based).
                        Controller reads allParams.get("answer0"), get("answer1"), etc.
                        Value = the option text (must match quiz.correctAnswer for scoring).
                    -->
                    <div class="ms-5">
                        <div th:each="option, optStat : ${quiz.options}"
                             class="form-check mb-2">
                            <input class="form-check-input quiz-radio"
                                   type="radio"
                                   th:id="'q' + ${status.index} + '_opt' + ${optStat.index}"
                                   th:name="'answer' + ${status.index}"
                                   th:value="${option}"
                                   th:data-question="${status.index}">
                            <label class="form-check-label option-label"
                                   th:for="'q' + ${status.index} + '_opt' + ${optStat.index}"
                                   th:text="${option}">
                                Option text
                            </label>
                        </div>

                        <!-- Unanswered warning (shown via JS) -->
                        <div class="unanswered-warning text-danger small mt-1" style="display:none;"
                             th:id="'warn' + ${status.index}">
                            <i class="bi bi-exclamation-circle me-1"></i>Please select an answer.
                        </div>
                    </div>

                </div>
            </div>
            <!-- /question cards -->

            <!-- Submit bar -->
            <div class="card form-card mt-3">
                <div class="card-body d-flex flex-wrap justify-content-between align-items-center gap-3">
                    <div class="text-muted small">
                        <i class="bi bi-info-circle me-1"></i>
                        Make sure all questions are answered before submitting.
                    </div>
                    <button type="submit" class="btn btn-success btn-lg px-5" id="submitBtn">
                        <i class="bi bi-send-fill me-2"></i>Submit Quiz
                    </button>
                </div>
            </div>

        </form>
    </div>
    <!-- /quiz form -->

</div><!-- /container -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    (() => {
        'use strict';

        const totalQuestions = /*[[${quizzes != null ? quizzes.size() : 0}]]*/ 0;
        const answeredBadge  = document.getElementById('answeredBadge');

        /* Track answered count */
        function updateProgress() {
            const answered = document.querySelectorAll('input[type="radio"]:checked').length;
            answeredBadge.textContent = answered + ' Answered';
            answeredBadge.className   = (answered === totalQuestions && totalQuestions > 0)
                ? 'badge bg-success'
                : 'badge bg-secondary';
        }

        document.querySelectorAll('.quiz-radio').forEach(radio => {
            radio.addEventListener('change', updateProgress);
        });

        /* Highlight selected option */
        document.querySelectorAll('.quiz-radio').forEach(radio => {
            radio.addEventListener('change', function () {
                const qIdx   = this.dataset.question;
                const labels = document.querySelectorAll('[data-question="' + qIdx + '"]');
                labels.forEach(r => {
                    const lbl = document.querySelector('label[for="' + r.id + '"]');
                    if (lbl) lbl.classList.toggle('fw-semibold', r.checked);
                });
            });
        });

        /* Validate all answered before submit */
        document.getElementById('quizForm').addEventListener('submit', function (event) {
            let allAnswered = true;
            for (let i = 0; i < totalQuestions; i++) {
                const answered = document.querySelector('input[name="answer' + i + '"]:checked');
                const warn     = document.getElementById('warn' + i);
                if (!answered) {
                    allAnswered = false;
                    if (warn) warn.style.display = 'block';
                } else {
                    if (warn) warn.style.display = 'none';
                }
            }
            if (!allAnswered) {
                event.preventDefault();
                window.scrollTo({ top: 0, behavior: 'smooth' });
                const firstUnanswered = document.querySelector('.unanswered-warning[style*="block"]');
                if (firstUnanswered) {
                    firstUnanswered.closest('.card').scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        });
    })();
</script>
</body>
</html>
