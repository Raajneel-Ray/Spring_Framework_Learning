<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login – Online Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-sm-10 col-md-6 col-lg-5 col-xl-4">

            <!-- Logo / Branding -->
            <div class="text-center mb-4">
                <i class="bi bi-patch-question-fill text-primary" style="font-size: 3rem;"></i>
                <h2 class="fw-bold mt-2">Online Quiz</h2>
                <p class="text-muted">Sign in to your account</p>
            </div>

            <div class="card auth-card">
                <div class="card-header bg-primary text-white text-center">
                    <h5 class="mb-0"><i class="bi bi-box-arrow-in-right me-2"></i>Login</h5>
                </div>
                <div class="card-body p-4">

                    <!-- Login error alert -->
                    <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2 flex-shrink-0"></i>
                        <span>Invalid username or password. Please try again.</span>
                    </div>

                    <!-- Registration success alert -->
                    <div th:if="${param.success}" class="alert alert-success d-flex align-items-center" role="alert">
                        <i class="bi bi-check-circle-fill me-2 flex-shrink-0"></i>
                        <span>Account created successfully! Please log in.</span>
                    </div>

                    <!-- Logout confirmation alert -->
                    <div th:if="${param.logout}" class="alert alert-info d-flex align-items-center" role="alert">
                        <i class="bi bi-info-circle-fill me-2 flex-shrink-0"></i>
                        <span>You have been logged out.</span>
                    </div>

                    <!-- Login Form -->
                    <!-- Spring Security processes POST /login with fields: username, password -->
                    <form th:action="@{/login}" method="post" novalidate id="loginForm">

                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">
                                <i class="bi bi-person me-1"></i>Username
                            </label>
                            <input type="text"
                                   id="username"
                                   name="username"
                                   class="form-control"
                                   placeholder="Enter your username"
                                   required
                                   minlength="3"
                                   maxlength="50"
                                   autocomplete="username">
                            <div class="invalid-feedback">
                                Username is required (minimum 3 characters).
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">
                                <i class="bi bi-lock me-1"></i>Password
                            </label>
                            <div class="input-group">
                                <input type="password"
                                       id="password"
                                       name="password"
                                       class="form-control"
                                       placeholder="Enter your password"
                                       required
                                       minlength="6"
                                       maxlength="100"
                                       autocomplete="current-password">
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword"
                                        title="Show/Hide password">
                                    <i class="bi bi-eye" id="toggleIcon"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback">
                                Password is required (minimum 6 characters).
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Login
                            </button>
                        </div>

                    </form>

                </div>
                <div class="card-footer text-center bg-transparent py-3">
                    <span class="text-muted">Don't have an account? </span>
                    <a th:href="@{/register}" class="fw-semibold text-decoration-none">Register here</a>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    /* Bootstrap validation */
    (() => {
        'use strict';
        const form = document.getElementById('loginForm');
        form.addEventListener('submit', event => {
            if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
            }
            form.classList.add('was-validated');
        }, false);
    })();

    /* Password toggle */
    document.getElementById('togglePassword').addEventListener('click', function () {
        const pwd = document.getElementById('password');
        const icon = document.getElementById('toggleIcon');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            pwd.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    });
</script>
</body>
</html>
