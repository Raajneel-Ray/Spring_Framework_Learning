<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Question – Online Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<!-- ===== Navbar ===== -->
<nav class="navbar navbar-dark bg-warning shadow-sm">
    <div class="container">
        <a th:href="@{/home}" class="navbar-brand fw-bold text-dark">
            <i class="bi bi-patch-question-fill me-2"></i>Quiz Admin Panel
        </a>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <button type="submit" class="btn btn-outline-dark btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </button>
        </form>
    </div>
</nav>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">

            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item">
                        <a th:href="@{/home}">
                            <i class="bi bi-house-door me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="breadcrumb-item active">
                        Edit Question #<span th:text="${quiz.id}"></span>
                    </li>
                </ol>
            </nav>

            <!-- Form Card -->
            <div class="card form-card">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0">
                        <i class="bi bi-pencil-fill me-2"></i>Edit Quiz Question
                        <small class="text-muted ms-2">
                            (ID: <span th:text="${quiz.id}"></span>)
                        </small>
                    </h5>
                </div>
                <div class="card-body p-4">

                    <!--
                        POST /editQuestion
                        @ModelAttribute("quiz") Question question binds:
                          - id              → question.setId()           (hidden field, required for update)
                          - questionText    → question.setQuestionText()
                          - optionsFromString → question.setOptionsFromString() (comma-separated)
                          - correctAnswer   → question.setCorrectAnswer()
                    -->
                    <form th:action="@{/editQuestion}" method="post" novalidate id="editQuizForm">

                        <!-- Hidden ID: must be submitted so the service can find the question -->
                        <input type="hidden" name="id" th:value="${quiz.id}">

                        <!-- Question Text -->
                        <div class="mb-4">
                            <label for="questionText" class="form-label fw-semibold">
                                <i class="bi bi-question-circle me-1"></i>Question Text
                                <span class="text-danger">*</span>
                            </label>
                            <textarea id="questionText"
                                      name="questionText"
                                      class="form-control"
                                      rows="3"
                                      placeholder="Enter your quiz question here..."
                                      required
                                      minlength="5"
                                      maxlength="500"
                                      th:text="${quiz.questionText}"></textarea>
                            <div class="invalid-feedback">
                                Question text is required (minimum 5 characters).
                            </div>
                            <div class="form-text text-muted">
                                <span id="questionCharCount">0</span>/500 characters
                            </div>
                        </div>

                        <!-- Answer Options -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-list-ul me-1"></i>Answer Options
                                <span class="text-danger">*</span>
                            </label>
                            <div class="row g-2">
                                <!-- Option A (index 0) -->
                                <div class="col-md-6">
                                    <div class="input-group">
                                        <span class="input-group-text bg-secondary text-white fw-bold">A</span>
                                        <input type="text"
                                               id="opt0"
                                               class="form-control option-input"
                                               placeholder="Option A"
                                               required
                                               maxlength="200"
                                               th:value="${#lists.size(quiz.options) > 0 ? quiz.options.get(0) : ''}">
                                        <div class="invalid-feedback">Option A is required.</div>
                                    </div>
                                </div>
                                <!-- Option B (index 1) -->
                                <div class="col-md-6">
                                    <div class="input-group">
                                        <span class="input-group-text bg-secondary text-white fw-bold">B</span>
                                        <input type="text"
                                               id="opt1"
                                               class="form-control option-input"
                                               placeholder="Option B"
                                               required
                                               maxlength="200"
                                               th:value="${#lists.size(quiz.options) > 1 ? quiz.options.get(1) : ''}">
                                        <div class="invalid-feedback">Option B is required.</div>
                                    </div>
                                </div>
                                <!-- Option C (index 2) -->
                                <div class="col-md-6">
                                    <div class="input-group">
                                        <span class="input-group-text bg-secondary text-white fw-bold">C</span>
                                        <input type="text"
                                               id="opt2"
                                               class="form-control option-input"
                                               placeholder="Option C"
                                               required
                                               maxlength="200"
                                               th:value="${#lists.size(quiz.options) > 2 ? quiz.options.get(2) : ''}">
                                        <div class="invalid-feedback">Option C is required.</div>
                                    </div>
                                </div>
                                <!-- Option D (index 3) -->
                                <div class="col-md-6">
                                    <div class="input-group">
                                        <span class="input-group-text bg-secondary text-white fw-bold">D</span>
                                        <input type="text"
                                               id="opt3"
                                               class="form-control option-input"
                                               placeholder="Option D"
                                               required
                                               maxlength="200"
                                               th:value="${#lists.size(quiz.options) > 3 ? quiz.options.get(3) : ''}">
                                        <div class="invalid-feedback">Option D is required.</div>
                                    </div>
                                </div>
                            </div>
                            <!-- Hidden field for comma-separated options (populated by JS) -->
                            <input type="hidden"
                                   id="optionsFromString"
                                   name="optionsFromString"
                                   th:value="${quiz.optionsAsString}">
                        </div>

                        <!-- Correct Answer -->
                        <div class="mb-4">
                            <label for="correctAnswer" class="form-label fw-semibold">
                                <i class="bi bi-check-circle me-1 text-success"></i>Correct Answer
                                <span class="text-danger">*</span>
                            </label>
                            <!--
                                Dropdown is pre-populated from existing options via JS.
                                The current correct answer is pre-selected using th:data-current.
                            -->
                            <select id="correctAnswer"
                                    name="correctAnswer"
                                    class="form-select"
                                    required
                                    th:data-current="${quiz.correctAnswer}">
                                <option value="" disabled>— Select the correct answer —</option>
                                <option th:each="opt : ${quiz.options}"
                                        th:value="${opt}"
                                        th:text="${opt}"
                                        th:selected="${opt == quiz.correctAnswer}">
                                </option>
                            </select>
                            <div class="invalid-feedback">Please select the correct answer.</div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="d-flex justify-content-between gap-2">
                            <a th:href="@{/home}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left me-1"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-floppy me-1"></i>Update Question
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (() => {
        'use strict';

        const optionInputs      = document.querySelectorAll('.option-input');
        const correctAnswerSel  = document.getElementById('correctAnswer');
        const hiddenOptions     = document.getElementById('optionsFromString');
        const questionText      = document.getElementById('questionText');
        const charCount         = document.getElementById('questionCharCount');

        /* Initialise char count */
        charCount.textContent = questionText.value.length;
        questionText.addEventListener('input', () => {
            charCount.textContent = questionText.value.length;
        });

        /* Rebuild the dropdown when any option input changes */
        function rebuildDropdown() {
            const prevSelected = correctAnswerSel.value;
            correctAnswerSel.innerHTML = '<option value="" disabled>— Select the correct answer —</option>';

            optionInputs.forEach((input, idx) => {
                const label = String.fromCharCode(65 + idx);
                const val   = input.value.trim();
                if (val) {
                    const opt       = document.createElement('option');
                    opt.value       = val;
                    opt.textContent = label + ': ' + val;
                    if (val === prevSelected) opt.selected = true;
                    correctAnswerSel.appendChild(opt);
                }
            });

            if (!correctAnswerSel.value) {
                correctAnswerSel.selectedIndex = 0;
            }
        }

        optionInputs.forEach(input => input.addEventListener('input', rebuildDropdown));

        /* Sync hidden field and validate on submit */
        document.getElementById('editQuizForm').addEventListener('submit', event => {
            const opts = Array.from(optionInputs).map(i => i.value.trim()).filter(v => v);
            hiddenOptions.value = opts.join(',');

            if (!document.getElementById('editQuizForm').checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
            }
            document.getElementById('editQuizForm').classList.add('was-validated');
        }, false);
    })();
</script>
</body>
</html>
